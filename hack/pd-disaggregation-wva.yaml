# P/D DISAGGREGATION + WVA WELL LIT PATH
# Based on pd-disaggregation.yaml with WVA (Workload Variant Autoscaler) added.
# Use this spec for both standup and run so pod labels are consistent.
#
# Changes from pd-disaggregation.yaml:
# - Added flowControl to EPP featureGates
# - Added wva: and chartVersions: blocks for WVA deployment
# - Added named 'metrics' container ports (decode: 8200, prefill: 8000) for PodMonitor
# - Added PodMonitor config for both decode and prefill

scenario:
  # ============================================================================
  # P/D Disaggregation + WVA - Qwen3-32B with 1 prefill and 2 decode pods
  # ============================================================================
  - name: "pd-disaggregation-wva"

    # =========================================================================
    # COMMON -- Applies to all deployment methods
    # =========================================================================

    # -------------------------------------------------------------------------
    # Model Configuration
    # Alternative models (commented out in original):
    #   - Qwen/Qwen3-0.6B
    #   - facebook/opt-125m
    #   - meta-llama/Llama-3.1-8B-Instruct
    #   - meta-llama/Llama-3.1-70B-Instruct
    #   - deepseek-ai/DeepSeek-R1-0528
    # -------------------------------------------------------------------------
    model:
      name: Qwen/Qwen3-32B
      shortName: qwen-qwen3-32b
      path: models/Qwen/Qwen3-32B
      huggingfaceId: Qwen/Qwen3-32B
      size: 1Ti
      maxModelLen: 32000
      blockSize: 128
      gpuMemoryUtilization: 0.95
      cacheBase: /model-cache

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true
    # The following sections configure the llm-d modelservice Helm chart
    # deployment including decode pods, prefill pods, routing, and GAIE.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Multinode Configuration (LeaderWorkerSet)
    # -------------------------------------------------------------------------
    #multinode:
    #  enabled: true

    # -------------------------------------------------------------------------
    # Routing Configuration
    # -------------------------------------------------------------------------
    routing:
      connector: nixlv2

    # -------------------------------------------------------------------------
    # Affinity / Node Selection
    # By default, affinity is disabled and pods schedule on any available node.
    # Options:
    #   1. Leave commented out -- no node selection constraint
    #   2. Set nodeSelector to "auto" -- auto-detects GPU labels from the cluster
    #   3. Set explicit labels -- pods only schedule on matching nodes
    # -------------------------------------------------------------------------
    # affinity:
    #   enabled: true
    #   nodeSelector:
    #     nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3      # OpenShift
    #     # gpu.nvidia.com/model: H200                        # Kubernetes
    #     # cloud.google.com/gke-accelerator: nvidia-h100-80gb  # GKE

    # =========================================================================
    # DEPLOYMENT METHOD -- Choose standalone or modelservice
    # =========================================================================
    modelservice:
      enabled: true

    standalone:
      enabled: false

    # -------------------------------------------------------------------------
    # Routing / GAIE Configuration
    # Reference: https://github.com/llm-d/llm-d/blob/main/guides/pd-disaggregation/gaie-pd/values.yaml
    # -------------------------------------------------------------------------
    inferenceExtension:
      pluginsConfigFile: "pd-config.yaml"
      pluginsCustomConfig:
        pd-config.yaml: |
          # ALWAYS DO PD IN THIS EXAMPLE (THRESHOLD 0)
          apiVersion: inference.networking.x-k8s.io/v1alpha1
          kind: EndpointPickerConfig
          featureGates:
            - flowControl
            - prepareDataPlugins
          plugins:
            - type: prefill-header-handler
            - type: prefix-cache-scorer
              parameters:
                maxPrefixBlocksToMatch: 256
                lruCapacityPerServer: 31250
            - type: queue-scorer
            - type: prefill-filter
            - type: decode-filter
            - type: max-score-picker
            - type: prefix-based-pd-decider
              parameters:
                nonCachedTokens: 16
            - type: pd-profile-handler
              parameters:
                primaryPort: 0
                deciderPluginName: prefix-based-pd-decider
          schedulingProfiles:
            - name: prefill
              plugins:
                - pluginRef: prefill-filter
                - pluginRef: max-score-picker
                - pluginRef: prefix-cache-scorer
                  weight: 2
                - pluginRef: queue-scorer
                  weight: 1
            - name: decode
              plugins:
                - pluginRef: decode-filter
                - pluginRef: max-score-picker
                - pluginRef: prefix-cache-scorer
                  weight: 2
                - pluginRef: queue-scorer
                  weight: 1

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Storage Configuration
    # -------------------------------------------------------------------------
    storage:
      modelPvc:
        size: 1Ti
        # Uncomment to specify storage class:
        # storageClassName: standard-rwx
        # storageClassName: shared-vast
        # storageClassName: ocs-storagecluster-cephfs

    # =========================================================================
    # WVA -- Workload Variant Autoscaler
    # =========================================================================
    wva:
      enabled: true
      wellLitPath: pd-disaggregation-wva
      namespace: ""
      image:
        repository: ghcr.io/llm-d/llm-d-workload-variant-autoscaler
        tag: v0.7.0
      replicaCount: 1
      controller:
        enabled: true
      namespaceScoped: true
      metrics:
        enabled: true
        port: 8443
        secure: true
      prometheus:
        baseUrl: https://thanos-querier.openshift-monitoring.svc.cluster.local
        port: 9091
      variantAutoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        variantCost: "10.0"
        slo:
          tpot: 10
          ttft: 1000
      hpa:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetAvgValue: 1
        behavior:
          scaleUp:
            stabilizationWindowSeconds: 120
            policies:
              - type: Percent
                value: 100
                periodSeconds: 15
          scaleDown:
            stabilizationWindowSeconds: 120
            policies:
              - type: Percent
                value: 100
                periodSeconds: 15
      vllmService:
        enabled: false

    chartVersions:
      wva: 0.7.0
      prometheusAdapter: 5.2.0

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true (continued)
    # The following sections configure prefill and decode pods.
    # =========================================================================

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Multi-NIC Pod Annotations (uncomment to enable)
    # To enable multi-nic, add annotations.prefill.pod / annotations.decode.pod below.
    # -------------------------------------------------------------------------
    #annotations:
    #  prefill:
    #    pod:
    #      k8s.v1.cni.cncf.io/networks: multi-nic-inference
    #  decode:
    #    pod:
    #      k8s.v1.cni.cncf.io/networks: multi-nic-inference

    # -------------------------------------------------------------------------
    # Prefill Configuration
    # -------------------------------------------------------------------------
    prefill:
      enabled: true
      replicas: 1

      # Named port required by PodMonitor portName: metrics.
      # Prefill vLLM binds directly to servicePort (no routing proxy), default 8000.
      ports:
        - name: metrics
          containerPort: 8000
          protocol: TCP

      monitoring:
        podmonitor:
          enabled: true
          portName: metrics
          path: /metrics
          interval: 30s
          labels:
            release: llmd

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 2
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      resources:
        limits:
          memory: 128Gi
          cpu: "32"
        requests:
          memory: 128Gi
          cpu: "32"

      # -----------------------------------------------------------------------
      # ROCE/GDR Configuration (uncomment to enable)
      # -----------------------------------------------------------------------
      #networkResource: "rdma/roce_gdr"
      #networkNr: 1

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # -----------------------------------------------------------------------
      extraEnvVars:
        - name: NCCL_EXCLUDE_IB_HCA
          value: "mlx5_0,mlx5_2,mlx5_4,mlx5_8,mlxl5_7,mlx5_10,mlx5_12,mlx5_14,mlx5_16"
        - name: NVSHMEM_DEBUG
          value: "INFO"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # -----------------------------------------------------------------------
      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      additionalVolumeMounts: []
      additionalVolumes: []

    # -------------------------------------------------------------------------
    # Decode Configuration
    # -------------------------------------------------------------------------
    decode:
      replicas: 2

      # Named port required by PodMonitor portName: metrics.
      # Decode vLLM binds to vllm.port (default 8200); routing proxy fronts on servicePort.
      ports:
        - name: metrics
          containerPort: 8200
          protocol: TCP

      monitoring:
        podmonitor:
          enabled: true
          portName: metrics
          path: /metrics
          interval: 30s
          labels:
            release: llmd

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 2
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      resources:
        limits:
          memory: 128Gi
          cpu: "32"
        requests:
          memory: 128Gi
          cpu: "32"

      # -----------------------------------------------------------------------
      # ROCE/GDR Configuration (uncomment to enable)
      # -----------------------------------------------------------------------
      #networkResource: "rdma/roce_gdr"
      #networkNr: 1

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # -----------------------------------------------------------------------
      extraEnvVars:
        - name: NCCL_EXCLUDE_IB_HCA
          value: "mlx5_0,mlx5_2,mlx5_4,mlx5_8,mlxl5_7,mlx5_10,mlx5_12,mlx5_14,mlx5_16"
        - name: NVSHMEM_DEBUG
          value: "INFO"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # -----------------------------------------------------------------------
      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      additionalVolumeMounts: []
      additionalVolumes: []

    # -------------------------------------------------------------------------
    # Multi-NIC Pod Annotations (uncomment to enable)
    # -------------------------------------------------------------------------
    #annotations:
    #  prefill:
    #    pod:
    #      k8s.v1.cni.cncf.io/networks: multi-nic-compute
    #  decode:
    #    pod:
    #      k8s.v1.cni.cncf.io/networks: multi-nic-compute

    # -------------------------------------------------------------------------
    # vLLM Common Configuration
    # -------------------------------------------------------------------------
    vllmCommon:
      host: "0.0.0.0"
      # KV Transfer Configuration
      kvTransfer:
        enabled: true
        connector: NixlConnector
        role: kv_both

      # KV Events not enabled in this scenario (used in precise-prefix-cache-aware)
      kvEvents:
        enabled: false

      flags:
        enforceEager: false
        disableLogRequests: true
        disableUvicornAccessLog: true
        enablePrefixCaching: true
        allowLongMaxModelLen: "1"
        serverDevMode: "1"

      #priorityClassName: nightly-gpu-critical

      volumes:
        - name: shared-config
          type: emptyDir
          emptyDir: {}
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      volumeMounts:
        - name: shared-config
          mountPath: /shared-config
        - name: dshm
          mountPath: /dev/shm

    # -------------------------------------------------------------------------
    # Timeout Configuration
    # -------------------------------------------------------------------------
    timeouts:
      controlWait: 900000
      harnessWait: 900000

    # =========================================================================
    # WORKLOAD / HARNESS -- Benchmark execution configuration
    # =========================================================================
    workDir: "~/data/pd-disaggregation-wva"

    harness:
      name: vllm-benchmark
      experimentProfile: random_concurrent.yaml
